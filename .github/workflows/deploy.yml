name: Build and Deploy to GitHub Pages
# Redeploy trigger: digest requires DEEPSEEK_API_KEY secret

on:
  # Cron: every 2 hours (UTC 00:00, 02:00, 04:00, ...)
  schedule:
    - cron: '0 */2 * * *'
  # Manual trigger
  workflow_dispatch:
  # Auto deploy on push to main (only if code changed)
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'db.py'
      - 'fetcher.py'
      - 'special_sources.py'
      - 'digest.py'
      - 'llm.py'
      - 'build.py'
      - 'feeds.json'
      - 'templates/**'
      - 'static/**'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

# GitHub Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch RSS feeds, generate digest, build static site
        run: python build.py
        env:
          PYTHONUNBUFFERED: '1'
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLM_MODEL: deepseek-chat
          TZ: Asia/Shanghai

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la docs/
          ls -la docs/data/
          echo "=== Item count ==="
          python -c "import json; d=json.load(open('docs/data/items.json')); print(f'Items: {len(d)}')"
          python -c "import json; d=json.load(open('docs/data/meta.json')); print(f'Feeds: {len(d[\"feeds\"])}, Total: {d[\"total_items\"]}')"
          python -c "import json; d=json.load(open('docs/data/digest.json')); print('Digest:', d.get('hero_headline') or d.get('exists'))"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
