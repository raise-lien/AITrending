<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AITrending — AI 信息聚合</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/app.css">
</head>
<body>

  <a href="#main" class="skip-link">跳到内容</a>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <div class="logo-icon">AI</div>
        <div class="logo-text"><span>AI</span>Trending</div>
      </div>
      <div class="topbar-actions">
        <div class="view-toggle" role="tablist" aria-label="视图切换">
          <button class="view-btn active" role="tab" aria-selected="true" data-view="feed" onclick="setView('feed')">信息流</button>
          <button class="view-btn" role="tab" aria-selected="false" data-view="digest" onclick="setView('digest')">今日简报</button>
        </div>
        <div class="stat-chip" title="已收集条目">
          <span class="dot"></span>
          <span id="stat-total">—</span> 条
        </div>
        <div class="stat-chip" title="数据源">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12" y2="20"/></svg>
          <span class="label"><span id="stat-feeds">—</span> 源</span>
        </div>
        <select id="year-select" onchange="setYear(this.value)" class="feed-select" aria-label="按年份筛选">
          <option value="">全部年份</option>
        </select>
        <div class="stat-chip" title="数据更新时间">
          更新于 <span id="last-updated">—</span>
        </div>
        <button class="btn theme-toggle" id="theme-btn" aria-label="切换深浅色主题" title="切换主题">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <main id="main" class="layout">

    <section id="view-feed">
      <div class="search-wrap" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="搜索 AI 研究、模型发布、技术动态…" class="search-input" oninput="debounceRender()" aria-label="搜索">
      </div>

      <div class="filter-row">
        <span class="filter-label">分类</span>
        <div class="cat-pills" id="cat-pills">
          <button class="cat-pill active" data-cat="" onclick="setCategory('')"><span class="cat-dot"></span>全部</button>
        </div>
      </div>

      <div class="filter-row" style="margin-bottom: var(--space-6);">
        <span class="filter-label">来源</span>
        <select id="feed-select" class="feed-select" onchange="setFeed(this.value)">
          <option value="">全部来源</option>
        </select>
        <span id="result-count" class="result-count"></span>
      </div>

      <div id="loading" class="hidden">
        <div class="items-list">
          <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <div id="items"></div>

      <div id="load-more-wrap" class="load-more-wrap hidden">
        <button class="load-more" id="btn-load-more" onclick="loadMore()">加载更多</button>
      </div>

      <div id="loading-more" class="loading-spinner hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>

      <div id="empty" class="state-empty hidden">
        <svg class="state-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6"/></svg>
        <div class="state-empty-title">暂无数据</div>
        <div class="state-empty-desc">数据将在下次定时抓取后更新</div>
      </div>
    </section>

    <section id="view-digest" class="hidden" aria-live="polite">
      <div class="digest-toolbar">
        <div class="digest-toolbar-left">
          <h1 class="digest-page-title">今日 AI 简报</h1>
          <span id="digest-meta" class="digest-meta"></span>
        </div>
      </div>
      <div id="digest-empty" class="state-empty">
        <div class="state-empty-title">还没有今日简报</div>
        <div class="state-empty-desc">下次 GitHub Actions 构建时会生成要点简报与今日 Idea Sparks</div>
      </div>
      <article id="digest-content" class="digest-content hidden"></article>
    </section>
  </main>

  <script>
    // ── 静态站：数据来自本地 JSON ──
    var BASE_URL = window.location.pathname.replace(/\/[^\/]*$/, '/');
    var ALL_ITEMS = [];
    var META = {};
    var FEED_CAT = {};
    var renderedItems = [];
    var currentFeed = '';
    var currentCategory = '';
    var currentSearch = '';
    var currentYear = '2026';
    var debounceTimer;
    var filteredItems = [];
    var currentOffset = 0;
    var PAGE_SIZE = 50;
    var isLoadingMore = false;

    var CAT_PALETTE = ['--c-cat-1','--c-cat-2','--c-cat-3','--c-cat-4','--c-cat-5','--c-cat-6','--c-cat-7','--c-cat-8'];
    function catColor(name) {
      if (!name) return 'var(--c-accent)';
      var h = 0;
      for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return 'var(' + CAT_PALETTE[h % CAT_PALETTE.length] + ')';
    }

    function stripHtml(html) {
      if (!html) return '';
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }
    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

    // ── 时间分组 ──
    var GROUP_ORDER = ['今天', '本周', '更早'];
    function groupOf(ts) {
      if (!ts) return '更早';
      var h = (Date.now() - new Date(ts).getTime()) / 3600000;
      if (h < 24) return '今天';
      if (h < 24 * 7) return '本周';
      return '更早';
    }

    var DIGEST = null;
    var currentView = 'feed';

    function cardHtml(item) {
      var title = item.title || '(no title)';
      var feed = item.feed_name || '';
      var summaryRaw = stripHtml(item.zh_summary || item.display_summary || item.summary || '');
      var summary = summaryRaw ? summaryRaw.slice(0, 240) : '';
      var link = escapeHtml(item.link || '#');
      var publishedTs = item.published_ts || '';
      var color = catColor(FEED_CAT[feed] || '');

      var freshBadge = '';
      if (publishedTs) {
        var diffH = (Date.now() - new Date(publishedTs).getTime()) / 3600000;
        if (diffH < 6) freshBadge = '<span class="fresh-badge new">NEW</span>';
        else if (diffH < 24) freshBadge = '<span class="fresh-badge today">今日</span>';
      }

      var timeStr = '';
      if (publishedTs) {
        var d = new Date(publishedTs);
        var now = new Date();
        timeStr = d.getFullYear() === now.getFullYear()
          ? d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })
          : d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
      }

      function hl(text) {
        var e = escapeHtml(text);
        if (!currentSearch) return e;
        try {
          return e.replace(new RegExp('(' + escapeRegExp(currentSearch) + ')', 'gi'), '<mark>$1</mark>');
        } catch (_) { return e; }
      }

      var aria = feed + ' · ' + timeStr + ' · ' + title;
      return '<a href="' + link + '" target="_blank" rel="noopener" class="item-card" style="--c-cat:' + color + '" aria-label="' + escapeHtml(aria) + '">' +
        '<div class="item-title">' + hl(title) + '</div>' +
        (summary ? '<div class="item-summary">' + hl(summary) + '</div>' : '') +
        '<div class="item-meta">' +
          '<span class="item-meta-source"><span class="cdot" style="background:' + color + '"></span>' + escapeHtml(feed) + '</span>' +
          (timeStr ? '<span class="item-meta-time">' + timeStr + '</span>' : '') +
          freshBadge +
        '</div></a>';
    }

    function renderGroups(items) {
      var byGroup = {};
      items.forEach(function(it) { (byGroup[groupOf(it.published_ts)] ||= []).push(it); });
      return GROUP_ORDER.filter(function(g) { return byGroup[g]; }).map(function(g) {
        var cards = byGroup[g].map(cardHtml).join('');
        return '<section class="feed-group"><div class="group-label">' + g + '<span class="gline"></span></div><div class="items-list">' + cards + '</div></section>';
      }).join('');
    }

    // ── 客户端过滤 ──
    function getFilteredItems() {
      return ALL_ITEMS.filter(function(item) {
        if (currentYear) {
          var ts = item.published_ts || '';
          if (!ts.startsWith(currentYear)) return false;
        }
        if (currentFeed && item.feed_name !== currentFeed) return false;
        if (currentCategory) {
          var cat = FEED_CAT[item.feed_name];
          if (!cat || cat !== currentCategory) return false;
        }
        if (currentSearch) {
          var q = currentSearch.toLowerCase();
          var t = (item.title || '').toLowerCase();
          var s = stripHtml(item.summary || '').toLowerCase();
          if (t.indexOf(q) === -1 && s.indexOf(q) === -1) return false;
        }
        return true;
      });
    }

    function render(reset) {
      if (reset === undefined) reset = true;
      var itemsEl = document.getElementById('items');
      var emptyEl = document.getElementById('empty');
      var countEl = document.getElementById('result-count');
      var loadMoreWrap = document.getElementById('load-more-wrap');

      if (reset) {
        filteredItems = getFilteredItems();
        currentOffset = 0;
        renderedItems = [];
        itemsEl.innerHTML = '';
        loadMoreWrap.classList.add('hidden');
      }

      var total = filteredItems.length;
      var pageItems = filteredItems.slice(currentOffset, currentOffset + PAGE_SIZE);
      renderedItems = reset ? pageItems : renderedItems.concat(pageItems);

      countEl.textContent = total ? total + ' 条结果' : '';

      if (!total) {
        emptyEl.classList.remove('hidden');
        var et = emptyEl.querySelector('.state-empty-title');
        var ed = emptyEl.querySelector('.state-empty-desc');
        if (currentSearch) { et.textContent = '没有匹配的内容'; ed.textContent = '试试更换分类、来源，或清空搜索关键词。'; }
        else { et.textContent = '暂无数据'; ed.textContent = '数据将在下次定时抓取后更新'; }
        itemsEl.innerHTML = '';
        return;
      }
      emptyEl.classList.add('hidden');
      itemsEl.innerHTML = renderGroups(renderedItems);

      if (currentOffset + PAGE_SIZE < total) loadMoreWrap.classList.remove('hidden');
      else loadMoreWrap.classList.add('hidden');
    }

    function debounceRender() {
      clearTimeout(debounceTimer);
      currentSearch = document.getElementById('search').value.trim();
      debounceTimer = setTimeout(function() { render(true); }, 300);
    }

    function setFeed(val) {
      currentFeed = val;
      currentCategory = '';
      document.querySelectorAll('.cat-pill').forEach(function(b) { b.classList.toggle('active', b.dataset.cat === ''); });
      render(true);
    }

    function setCategory(cat) {
      currentCategory = cat;
      currentFeed = '';
      document.getElementById('feed-select').value = '';
      document.querySelectorAll('.cat-pill').forEach(function(b) { b.classList.toggle('active', b.dataset.cat === cat); });
      render(true);
    }

    function setYear(year) {
      currentYear = year;
      document.getElementById('year-select').value = year;
      updateStats();
      render(true);
    }

    function loadMore() {
      if (isLoadingMore) return;
      isLoadingMore = true;
      currentOffset += PAGE_SIZE;
      document.getElementById('load-more-wrap').classList.add('hidden');
      document.getElementById('loading-more').classList.remove('hidden');
      render(false);
      document.getElementById('loading-more').classList.add('hidden');
      isLoadingMore = false;
    }

    function updateStats() {
      var total = META.total_items || 0;
      var yearFiltered = currentYear
        ? ALL_ITEMS.filter(function(i) { return (i.published_ts || '').startsWith(currentYear); }).length
        : total;
      document.getElementById('stat-total').textContent = yearFiltered.toLocaleString();
      document.getElementById('stat-feeds').textContent = META.feeds ? META.feeds.length : '—';
      var updatedEl = document.getElementById('last-updated');
      if (updatedEl && META.generated_at) {
        var d = new Date(META.generated_at);
        updatedEl.textContent = d.toLocaleString('zh-CN', { dateStyle: 'short', timeStyle: 'short' });
      }
    }

    // ── 主题切换 (light/dark) ──
    var root = document.documentElement;
    function applyTheme(t) {
      root.dataset.theme = t;
      try { localStorage.setItem('ait-theme', t); } catch (_) {}
      var icon = document.getElementById('theme-icon');
      if (icon) icon.innerHTML = t === 'dark'
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
    }
    (function initTheme() {
      var t = 'dark';
      try { t = localStorage.getItem('ait-theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'); } catch (_) {}
      applyTheme(t);
    })();
    document.getElementById('theme-btn').addEventListener('click', function() {
      applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    function applyCatColors() {
      document.querySelectorAll('.cat-pill').forEach(function(b) {
        var dot = b.querySelector('.cat-dot');
        if (dot) dot.style.background = catColor(b.dataset.cat);
      });
    }

    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(function(b) {
        var on = b.dataset.view === view;
        b.classList.toggle('active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      document.getElementById('view-feed').classList.toggle('hidden', view !== 'feed');
      document.getElementById('view-digest').classList.toggle('hidden', view !== 'digest');
      if (view === 'digest') renderDigest(DIGEST);
    }

    // ── Idea Sparks 交互状态 ──
    var currentDigest = null;
    var ideaFull = [];
    var ideaLinkIdx = {};
    var ideaFilter = 'all';
    var ideaSort = 'composite';
    var ideaRenderList = [];

    var IDEA_FILTERS = [
      { k: 'all', label: '全部' }, { k: 'pm', label: 'PM' },
      { k: 'designer', label: '设计' }, { k: 'engineer', label: '工程' },
      { k: 'investor', label: '投资人' }
    ];
    function perspLabel(p) {
      var m = { pm: 'PM', designer: '设计', engineer: '工程', investor: '投资人' };
      return m[p] || (p || '');
    }
    function scoreBar(label, val) {
      if (typeof val !== 'number' || val < 1 || val > 5) return '';
      return '<div class="score-bar"><span class="score-bar-label">' + label + '</span>' +
        '<span class="score-bar-track"><span class="score-bar-fill" style="width:' + (val * 20) + '%"></span></span>' +
        '<span class="score-bar-val">' + val + '/5</span></div>';
    }
    function signalLinkHtml(url) {
      var info = ideaLinkIdx[url];
      var label = (info && info.source)
        ? escapeHtml(info.source) + (info.title ? ' · ' + escapeHtml(info.title) : '')
        : escapeHtml(url);
      return '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener" title="' + escapeHtml(url) + '">' + label + '</a>';
    }
    function ideaCardHtml(s, idx) {
      var scores = s.scores || {};
      var persp = perspLabel(s.perspective);
      var assumptions = (s.assumptions || []).map(function(a) { return '<li>' + escapeHtml(a) + '</li>'; }).join('');
      var links = (s.signal_urls || []).slice(0, 3).map(function(u) { return signalLinkHtml(u); }).join('');
      var stackRow = s.stack ? '<p class="idea-row"><span class="idea-label">技术栈</span>' + escapeHtml(s.stack) + '</p>' : '';
      var reuseRow = (s.reuse && s.reuse !== '无') ? '<p class="idea-row"><span class="idea-label">可借力</span>' + escapeHtml(s.reuse) + '</p>' : '';
      var effortRow = s.effort ? '<p class="idea-row idea-row--muted"><span class="idea-label">工作量</span>' + escapeHtml(s.effort) + '</p>' : '';
      return '<article class="idea-card" data-persp="' + escapeHtml(s.perspective || '') + '">' +
        '<div class="idea-card-top">' +
          '<span class="idea-rank">' + (idx + 1) + '</span>' +
          (persp ? '<span class="idea-persp">' + escapeHtml(persp) + '</span>' : '') +
          '<button class="idea-toggle" type="button" onclick="toggleIdea(this)" aria-expanded="false">展开</button>' +
        '</div>' +
        '<h3 class="idea-name">' + escapeHtml(s.name || '') + '</h3>' +
        '<p class="idea-oneliner">' + escapeHtml(s.one_liner || '') + '</p>' +
        (s.mvp ? '<p class="idea-mvp"><span class="idea-label">MVP</span>' + escapeHtml(s.mvp) + '</p>' : '') +
        '<div class="idea-scores">' + scoreBar('新意', scores.novelty) + scoreBar('可行', scores.feasibility) + scoreBar('影响', scores.impact) + '</div>' +
        (links ? '<div class="idea-links">' + links + '</div>' : '') +
        '<div class="idea-details hidden">' +
          (s.opportunity ? '<p class="idea-row"><span class="idea-label">机会</span>' + escapeHtml(s.opportunity) + '</p>' : '') +
          (s.solution ? '<p class="idea-row"><span class="idea-label">方案</span>' + escapeHtml(s.solution) + '</p>' : '') +
          (s.why_now ? '<p class="idea-row idea-row--muted"><span class="idea-label">为何现在</span>' + escapeHtml(s.why_now) + '</p>' : '') +
          (s.signal ? '<p class="idea-row idea-row--muted"><span class="idea-label">信号</span>' + escapeHtml(s.signal) + '</p>' : '') +
          stackRow + reuseRow + effortRow +
          (assumptions ? '<ul class="idea-assumptions">' + assumptions + '</ul>' : '') +
        '</div>' +
        '<div class="idea-actions"><button class="idea-copy" type="button" onclick="copyIdeaAsReadme(' + idx + ')">复制为 README</button></div>' +
      '</article>';
    }
    function toggleIdea(btn) {
      var card = btn.closest('.idea-card');
      if (!card) return;
      var expanded = card.classList.toggle('expanded');
      btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      btn.textContent = expanded ? '收起' : '展开';
    }
    function copyIdeaAsReadme(idx) {
      var s = ideaRenderList[idx];
      if (!s) return;
      function li(u) {
        var info = ideaLinkIdx[u];
        return (info && info.source) ? '- ' + info.source + ' · ' + (info.title || u) : '- ' + u;
      }
      var L = [];
      L.push('# ' + (s.name || '未命名 idea'), '');
      if (s.one_liner) L.push('> ' + s.one_liner, '');
      if (s.mvp) L.push('## 48h MVP', s.mvp, '');
      if (s.opportunity) L.push('## 机会', s.opportunity, '');
      if (s.solution) L.push('## 方案', s.solution, '');
      if (s.why_now) L.push('## 为何现在', s.why_now, '');
      if (s.stack) L.push('## 建议技术栈', s.stack, '');
      if (s.reuse && s.reuse !== '无') L.push('## 可借力', s.reuse, '');
      if (s.effort) L.push('## 预计工作量', s.effort, '');
      var scores = s.scores || {};
      var sc = [];
      if (typeof scores.novelty === 'number') sc.push('新意 ' + scores.novelty);
      if (typeof scores.feasibility === 'number') sc.push('可行 ' + scores.feasibility);
      if (typeof scores.impact === 'number') sc.push('影响 ' + scores.impact);
      if (sc.length) L.push('## 评分', sc.join(' / '), '');
      if ((s.assumptions || []).length) L.push('## 待验证假设', s.assumptions.map(function(a){return '- ' + a;}).join('\n'), '');
      if ((s.signal_urls || []).length) L.push('## 信号来源', s.signal_urls.map(li).join('\n'), '');
      var md = L.join('\n');
      function done() {
        var btns = document.querySelectorAll('.idea-copy');
        var b = btns[idx];
        if (b) { var t = b.textContent; b.textContent = '已复制 ✓'; setTimeout(function(){ b.textContent = t; }, 1500); }
      }
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(md).then(done).catch(function(){ fallbackCopy(md); });
      } else { fallbackCopy(md); }
    }
    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta);
    }
    function ideaToolbarHtml() {
      var pills = IDEA_FILTERS.map(function(f) {
        return '<button class="idea-pill ' + (ideaFilter === f.k ? 'active' : '') + '" type="button" data-filter="' + f.k + '" onclick="setIdeaFilter(\'' + f.k + '\')">' + f.label + '</button>';
      }).join('');
      return '<div class="idea-toolbar"><div class="idea-pills">' + pills + '</div>' +
        '<select class="idea-sort" onchange="setIdeaSort(this.value)" aria-label="按评分排序">' +
        '<option value="composite"' + (ideaSort === 'composite' ? ' selected' : '') + '>综合排序</option>' +
        '<option value="novelty"' + (ideaSort === 'novelty' ? ' selected' : '') + '>按新意</option>' +
        '<option value="feasibility"' + (ideaSort === 'feasibility' ? ' selected' : '') + '>按可行</option>' +
        '<option value="impact"' + (ideaSort === 'impact' ? ' selected' : '') + '>按影响</option>' +
        '</select></div>';
    }
    function ideaSectionHtml() {
      var list = ideaFull.slice();
      if (ideaFilter !== 'all') list = list.filter(function(s) { return s.perspective === ideaFilter; });
      function valOf(s, k) { return (s.scores && typeof s.scores[k] === 'number') ? s.scores[k] : 0; }
      if (ideaSort === 'novelty') list.sort(function(a, b) { return valOf(b, 'novelty') - valOf(a, 'novelty'); });
      else if (ideaSort === 'feasibility') list.sort(function(a, b) { return valOf(b, 'feasibility') - valOf(a, 'feasibility'); });
      else if (ideaSort === 'impact') list.sort(function(a, b) { return valOf(b, 'impact') - valOf(a, 'impact'); });
      else list.sort(function(a, b) { return (valOf(b, 'novelty') + valOf(b, 'impact')) - (valOf(a, 'novelty') + valOf(a, 'impact')); });
      ideaRenderList = list;
      var cards = list.map(function(s, i) { return ideaCardHtml(s, i); }).join('');
      return '<section class="digest-ideas" id="digest-ideas">' +
        '<div class="digest-ideas-head"><h2 class="digest-section-title">今日 Idea Sparks</h2>' +
        '<p class="digest-section-desc">从信息洪流里挖可验证的项目方向（信号 → 机会 → 方案 → MVP）</p></div>' +
        ideaToolbarHtml() +
        '<div class="idea-grid">' + (cards || '<p class="idea-empty">该视角下暂无 idea</p>') + '</div>' +
        (currentDigest && currentDigest.idea_note ? '<p class="idea-note">' + escapeHtml(currentDigest.idea_note) + '</p>' : '') +
        '</section>';
    }
    function setIdeaFilter(k) { ideaFilter = k; var el = document.getElementById('digest-ideas'); if (el) el.outerHTML = ideaSectionHtml(); }
    function setIdeaSort(v) { ideaSort = v; var el = document.getElementById('digest-ideas'); if (el) el.outerHTML = ideaSectionHtml(); }

    function renderDigest(data) {
      currentDigest = data;
      var emptyEl = document.getElementById('digest-empty');
      var contentEl = document.getElementById('digest-content');
      var metaEl = document.getElementById('digest-meta');
      if (!data || !data.hero_headline) {
        emptyEl.classList.remove('hidden');
        contentEl.classList.add('hidden');
        metaEl.textContent = '';
        return;
      }
      emptyEl.classList.add('hidden');
      contentEl.classList.remove('hidden');
      metaEl.textContent = (data.date || '') + (data.model ? ' · ' + data.model : '');

      ideaFull = data.idea_sparks || [];
      ideaLinkIdx = data.link_index || {};
      ideaFilter = 'all';
      ideaSort = 'composite';

      var keywords = (data.keywords || []).map(function(k) {
        return '<span class="digest-kw">' + escapeHtml(k) + '</span>';
      }).join('');

      var briefs = (data.briefs || []).slice().sort(function(a, b) {
        return (b.importance || 0) - (a.importance || 0);
      });
      var briefHtml = briefs.map(function(b, i) {
        return '<a class="digest-brief" href="' + escapeHtml(b.url || '#') + '" target="_blank" rel="noopener">' +
          '<div class="digest-brief-rank">' + (i + 1) + '</div>' +
          '<div class="digest-brief-body">' +
            '<div class="digest-brief-title">' + escapeHtml(b.title || '') + '</div>' +
            '<div class="digest-brief-summary">' + escapeHtml(b.summary || '') + '</div>' +
            '<div class="digest-brief-meta">' +
              '<span>' + escapeHtml(b.source || '') + '</span>' +
              (b.importance ? '<span>重要度 ' + b.importance + '/5</span>' : '') +
            '</div></div></a>';
      }).join('');

      contentEl.innerHTML =
        '<header class="digest-hero">' +
          '<p class="digest-kicker">AI Daily Brief</p>' +
          '<h2 class="digest-headline">' + escapeHtml(data.hero_headline) + '</h2>' +
          '<p class="digest-overview">' + escapeHtml(data.daily_overview || '') + '</p>' +
          (keywords ? '<div class="digest-keywords">' + keywords + '</div>' : '') +
        '</header>' +
        ideaSectionHtml() +
        '<section class="digest-briefs-wrap">' +
          '<h2 class="digest-section-title">要点速览</h2>' +
          '<div class="digest-briefs">' + briefHtml + '</div>' +
        '</section>' +
        (data.editor_note ? '<footer class="digest-note">' + escapeHtml(data.editor_note) + '</footer>' : '');
    }

    // ── 加载数据 ──
    async function initData() {
      try {
        var itemsRes = await fetch(BASE_URL + 'data/items.json');
        var metaRes = await fetch(BASE_URL + 'data/meta.json');
        ALL_ITEMS = await itemsRes.json();
        META = await metaRes.json();
        try {
          var digestRes = await fetch(BASE_URL + 'data/digest.json');
          if (digestRes.ok) DIGEST = await digestRes.json();
        } catch (_) {}
      } catch (e) {
        document.getElementById('items').innerHTML = '<div style="color:var(--c-text-muted);text-align:center;padding:40px;">数据加载失败，请稍后刷新</div>';
        return;
      }

      var yearSelect = document.getElementById('year-select');
      yearSelect.innerHTML = '<option value="">全部年份</option>' +
        META.years.map(function(y) { return '<option value="' + y + '">' + y + '</option>'; }).join('');
      yearSelect.value = currentYear;

      var catPills = document.getElementById('cat-pills');
      catPills.innerHTML = '<button class="cat-pill active" data-cat="" onclick="setCategory(this.dataset.cat)"><span class="cat-dot"></span>全部</button>' +
        META.categories.map(function(c) {
          return '<button class="cat-pill" data-cat="' + escapeHtml(c.name) + '" onclick="setCategory(this.dataset.cat)"><span class="cat-dot"></span>' + escapeHtml(c.name) + '</button>';
        }).join('');

      var feedSelect = document.getElementById('feed-select');
      feedSelect.innerHTML = '<option value="">全部来源</option>' +
        META.feeds.map(function(f) {
          return '<option value="' + escapeHtml(f.name) + '">' + escapeHtml(f.name) + ' (' + f.count + ')</option>';
        }).join('');

      META.feeds.forEach(function(f) { FEED_CAT[f.name] = f.category || ''; });

      applyCatColors();
      updateStats();
      render(true);
    }

    // ── Infinite scroll via IntersectionObserver ──
    var sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    sentinel.style.height = '1px';
    document.querySelector('.layout').appendChild(sentinel);

    var observer = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting && currentOffset + PAGE_SIZE < filteredItems.length && !isLoadingMore) {
        loadMore();
      }
    }, { rootMargin: '200px' });
    observer.observe(sentinel);

    initData();
  </script>
</body>
</html>
