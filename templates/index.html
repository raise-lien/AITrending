<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AITrending — AI 信息聚合</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/app.css') }}">
</head>
<body>

  <a href="#main" class="skip-link">跳到内容</a>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <div class="logo-icon">AI</div>
        <div class="logo-text"><span>AI</span>Trending</div>
      </div>
      <div class="topbar-actions">
        <div class="view-toggle" role="tablist" aria-label="视图切换">
          <button class="view-btn active" role="tab" aria-selected="true" data-view="feed" onclick="setView('feed')">信息流</button>
          <button class="view-btn" role="tab" aria-selected="false" data-view="digest" onclick="setView('digest')">今日简报</button>
        </div>
        <div class="stat-chip" title="已收集条目">
          <span class="dot"></span>
          <span id="stat-total">—</span> 条
        </div>
        <div class="stat-chip" title="数据源">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12" y2="20"/></svg>
          <span class="label"><span id="stat-feeds">—</span> 源</span>
        </div>
        <select id="year-select" onchange="setYear(this.value)" class="feed-select" aria-label="按年份筛选">
          <option value="">全部年份</option>
          {% for y in years %}
          <option value="{{ y }}">{{ y }}</option>
          {% endfor %}
        </select>
        <button class="btn theme-toggle" id="theme-btn" aria-label="切换深浅色主题" title="切换主题">
          <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="btn btn--primary" id="btn-refresh" onclick="refresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          刷新
        </button>
      </div>
    </div>
  </div>

  <main id="main" class="layout">

    <section id="view-feed">
      <div class="search-wrap" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="搜索 AI 研究、模型发布、技术动态…" class="search-input" oninput="debounceRender()" aria-label="搜索">
      </div>

      <div class="filter-row">
        <span class="filter-label">分类</span>
        <div class="cat-pills" id="cat-pills">
          <button class="cat-pill active" data-cat="" onclick="setCategory(this.dataset.cat)"><span class="cat-dot"></span>全部</button>
          {% for c in categories %}
          <button class="cat-pill" data-cat="{{ c.name }}" onclick="setCategory(this.dataset.cat)"><span class="cat-dot"></span>{{ c.name }}</button>
          {% endfor %}
        </div>
      </div>

      <div class="filter-row" style="margin-bottom: var(--space-6);">
        <span class="filter-label">来源</span>
        <select id="feed-select" class="feed-select" onchange="setFeed(this.value)">
          <option value="">全部来源</option>
          {% for f in feeds %}
          <option value="{{ f.feed_name }}">{{ f.feed_name }} ({{ f.cnt }})</option>
          {% endfor %}
        </select>
        <span id="result-count" class="result-count"></span>
      </div>

      <div id="loading" class="hidden">
        <div class="items-list">
          <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <div id="items"></div>

      <div id="load-more-wrap" class="load-more-wrap hidden">
        <button class="load-more" id="btn-load-more" onclick="loadMore()">加载更多</button>
      </div>

      <div id="loading-more" class="loading-spinner hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>

      <div id="empty" class="state-empty hidden">
        <svg class="state-empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6"/></svg>
        <div class="state-empty-title">暂无数据</div>
        <div class="state-empty-desc">点击右上角「刷新」拉取最新内容</div>
      </div>
    </section>

    <section id="view-digest" class="hidden" aria-live="polite">
      <div class="digest-toolbar">
        <div class="digest-toolbar-left">
          <h1 class="digest-page-title">今日 AI 简报</h1>
          <span id="digest-meta" class="digest-meta"></span>
        </div>
        <button class="btn btn--primary" id="btn-gen-digest" onclick="generateDigest(true)">
          生成 / 刷新简报
        </button>
      </div>
      <div id="digest-loading" class="digest-loading hidden">
        <div class="loading-spinner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>
        <p>DeepSeek 正在整理今日要点…（约 30–90 秒）</p>
      </div>
      <div id="digest-empty" class="state-empty">
        <div class="state-empty-title">还没有今日简报</div>
        <div class="state-empty-desc">点击「生成 / 刷新简报」，用 DeepSeek 从信息流中提炼今日要点，并挖出可动手的项目 idea</div>
      </div>
      <article id="digest-content" class="digest-content hidden"></article>
    </section>
  </main>

  <script>
    // feed_name -> category 映射 (由后端注入)
    const FEED_CAT = {
      {% for f in feeds %}{{ f.feed_name|tojson }}: {{ (f.category or '')|tojson }},{% endfor %}
    };

    const CAT_PALETTE = ['--c-cat-1','--c-cat-2','--c-cat-3','--c-cat-4','--c-cat-5','--c-cat-6','--c-cat-7','--c-cat-8'];
    function catColor(name) {
      if (!name) return 'var(--c-accent)';
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return 'var(' + CAT_PALETTE[h % CAT_PALETTE.length] + ')';
    }

    let currentFeed = '';
    let currentCategory = '';
    let currentSearch = '';
    let currentYear = '2026';
    let debounceTimer;
    let abortController;
    let allItems = [];
    let totalCount = 0;
    let currentOffset = 0;
    const PAGE_SIZE = 50;
    let isLoadingMore = false;

    function stripHtml(html) {
      if (!html) return '';
      const tmp = document.createElement('div');
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || '';
    }
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── 时间分组 ──
    const GROUP_ORDER = ['今天', '本周', '更早'];
    function groupOf(ts) {
      if (!ts) return '更早';
      const h = (Date.now() - new Date(ts).getTime()) / 3600000;
      if (h < 24) return '今天';
      if (h < 24 * 7) return '本周';
      return '更早';
    }

    const LLM_READY = {{ (llm_ready|default(false))|tojson }};
    let currentView = 'feed';

    function cardHtml(item) {
      const title = item.title || '(no title)';
      const feed = item.feed_name || '';
      const summaryRaw = stripHtml(item.display_summary || item.zh_summary || item.summary || '');
      const summary = summaryRaw ? summaryRaw.slice(0, 240) : '';
      const link = escapeHtml(item.link || '#');
      const publishedTs = item.published_ts || '';
      const color = catColor(FEED_CAT[feed] || '');

      let freshBadge = '';
      if (publishedTs) {
        const diffH = (Date.now() - new Date(publishedTs).getTime()) / 3600000;
        if (diffH < 6) freshBadge = '<span class="fresh-badge new">NEW</span>';
        else if (diffH < 24) freshBadge = '<span class="fresh-badge today">今日</span>';
      }

      let timeStr = '';
      if (publishedTs) {
        const d = new Date(publishedTs);
        const now = new Date();
        timeStr = d.getFullYear() === now.getFullYear()
          ? d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' })
          : d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
      }

      const hl = (text) => {
        const e = escapeHtml(text);
        if (!currentSearch) return e;
        try {
          return e.replace(new RegExp('(' + currentSearch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'), '<mark>$1</mark>');
        } catch (_) { return e; }
      };

      const aria = feed + ' · ' + timeStr + ' · ' + title;
      return `<a href="${link}" target="_blank" rel="noopener" class="item-card" style="--c-cat:${color}" aria-label="${escapeHtml(aria)}">
        <div class="item-title">${hl(title)}</div>
        ${summary ? `<div class="item-summary">${hl(summary)}</div>` : ''}
        <div class="item-meta">
          <span class="item-meta-source"><span class="cdot" style="background:${color}"></span>${escapeHtml(feed)}</span>
          ${timeStr ? `<span class="item-meta-time">${timeStr}</span>` : ''}
          ${freshBadge}
        </div>
      </a>`;
    }

    function renderGroups(items) {
      const byGroup = {};
      items.forEach(it => { (byGroup[groupOf(it.published_ts)] ||= []).push(it); });
      return GROUP_ORDER.filter(g => byGroup[g]).map(g => {
        const cards = byGroup[g].map(cardHtml).join('');
        return `<section class="feed-group"><div class="group-label">${g}<span class="gline"></span></div><div class="items-list">${cards}</div></section>`;
      }).join('');
    }

    async function render(reset = true) {
      const itemsEl = document.getElementById('items');
      const emptyEl = document.getElementById('empty');
      const loadingEl = document.getElementById('loading');
      const countEl = document.getElementById('result-count');
      const loadMoreWrap = document.getElementById('load-more-wrap');

      if (reset) {
        allItems = [];
        currentOffset = 0;
        if (abortController) abortController.abort();
        abortController = new AbortController();
        loadingEl.classList.remove('hidden');
        emptyEl.classList.add('hidden');
        itemsEl.innerHTML = '';
        loadMoreWrap.classList.add('hidden');
      }

      const params = new URLSearchParams({ limit: PAGE_SIZE, offset: currentOffset });
      if (currentFeed) params.set('feed', currentFeed);
      else if (currentCategory) params.set('category', currentCategory);
      if (currentSearch) params.set('q', currentSearch);
      if (currentYear) params.set('year', currentYear);

      let data;
      try {
        const res = await fetch(`/api/items?${params}`, { signal: abortController.signal });
        data = await res.json();
      } catch (e) {
        if (e.name === 'AbortError') return;
        itemsEl.innerHTML = '<div style="color:var(--c-text-muted);text-align:center;padding:40px;">加载失败，请确认服务已启动</div>';
        loadingEl.classList.add('hidden');
        return;
      }

      loadingEl.classList.add('hidden');

      const items = data.items || [];
      totalCount = data.total || 0;
      allItems = reset ? items : allItems.concat(items);

      countEl.textContent = totalCount ? `${totalCount} 条结果` : '';

      if (!allItems.length) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      itemsEl.innerHTML = renderGroups(allItems);

      if (allItems.length < totalCount) {
        loadMoreWrap.classList.remove('hidden');
      } else {
        loadMoreWrap.classList.add('hidden');
      }
    }

    function debounceRender() {
      clearTimeout(debounceTimer);
      currentSearch = document.getElementById('search').value.trim();
      debounceTimer = setTimeout(() => render(true), 300);
    }

    function setFeed(val) {
      currentFeed = val;
      currentCategory = '';
      document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.dataset.cat === ''));
      render(true);
    }

    function setCategory(cat) {
      currentCategory = cat;
      currentFeed = '';
      document.getElementById('feed-select').value = '';
      document.querySelectorAll('.cat-pill').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
      render(true);
    }

    function setYear(year) {
      currentYear = year;
      document.getElementById('year-select').value = year;
      updateStats();
      render(true);
    }

    async function loadMore() {
      if (isLoadingMore) return;
      isLoadingMore = true;
      currentOffset += PAGE_SIZE;
      const loadMoreWrap = document.getElementById('load-more-wrap');
      const loadingMore = document.getElementById('loading-more');
      loadMoreWrap.classList.add('hidden');
      loadingMore.classList.remove('hidden');
      await render(false);
      loadingMore.classList.add('hidden');
      isLoadingMore = false;
    }

    async function updateStats() {
      try {
        const year = currentYear;
        const f = await fetch(year ? `/api/feeds?year=${year}` : '/api/feeds');
        const feeds = await f.json();
        const total = feeds.reduce((s, x) => s + (x.cnt || 0), 0);
        document.getElementById('stat-total').textContent = total.toLocaleString();
        document.getElementById('stat-feeds').textContent = feeds.length;
      } catch (e) {}
    }

    async function refresh() {
      const btn = document.getElementById('btn-refresh');
      btn.classList.add('btn-spin');
      try { await fetch('/api/refresh'); } catch (e) {}
      setTimeout(() => {
        btn.classList.remove('btn-spin');
        updateStats();
        render(true);
      }, 1200);
    }

    // ── 主题切换 (light/dark) ──
    const root = document.documentElement;
    function applyTheme(t) {
      root.dataset.theme = t;
      try { localStorage.setItem('ait-theme', t); } catch (_) {}
      const icon = document.getElementById('theme-icon');
      if (icon) icon.innerHTML = t === 'dark'
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
    }
    (function initTheme() {
      let t = 'dark';
      try {
        t = localStorage.getItem('ait-theme') || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      } catch (_) {}
      applyTheme(t);
    })();
    document.getElementById('theme-btn').addEventListener('click', () => {
      applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    // 分类色点着色
    function applyCatColors() {
      document.querySelectorAll('.cat-pill').forEach(b => {
        const dot = b.querySelector('.cat-dot');
        if (dot) dot.style.background = catColor(b.dataset.cat);
      });
    }
    applyCatColors();

    // ── Infinite scroll via IntersectionObserver ──
    const sentinel = document.createElement('div');
    sentinel.id = 'sentinel';
    sentinel.style.height = '1px';
    document.querySelector('.layout').appendChild(sentinel);

    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && allItems.length < totalCount && !isLoadingMore) {
        loadMore();
      }
    }, { rootMargin: '200px' });
    observer.observe(sentinel);

    // ── View: feed | digest ──
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => {
        const on = b.dataset.view === view;
        b.classList.toggle('active', on);
        b.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      document.getElementById('view-feed').classList.toggle('hidden', view !== 'feed');
      document.getElementById('view-digest').classList.toggle('hidden', view !== 'digest');
      if (view === 'digest') loadDigest();
    }

    function renderDigest(data) {
      const emptyEl = document.getElementById('digest-empty');
      const contentEl = document.getElementById('digest-content');
      const metaEl = document.getElementById('digest-meta');
      if (!data || !data.hero_headline) {
        emptyEl.classList.remove('hidden');
        contentEl.classList.add('hidden');
        metaEl.textContent = '';
        return;
      }
      emptyEl.classList.add('hidden');
      contentEl.classList.remove('hidden');
      metaEl.textContent = (data.date || '') + (data.model ? ' · ' + data.model : '');

      const keywords = (data.keywords || []).map(k =>
        `<span class="digest-kw">${escapeHtml(k)}</span>`
      ).join('');

      const briefs = (data.briefs || []).slice().sort((a, b) => (b.importance || 0) - (a.importance || 0));
      const briefHtml = briefs.map((b, i) => `
        <a class="digest-brief" href="${escapeHtml(b.url || '#')}" target="_blank" rel="noopener">
          <div class="digest-brief-rank">${i + 1}</div>
          <div class="digest-brief-body">
            <div class="digest-brief-title">${escapeHtml(b.title || '')}</div>
            <div class="digest-brief-summary">${escapeHtml(b.summary || '')}</div>
            <div class="digest-brief-meta">
              <span>${escapeHtml(b.source || '')}</span>
              ${b.importance ? `<span>重要度 ${b.importance}/5</span>` : ''}
            </div>
          </div>
        </a>`).join('');

      const sparks = data.idea_sparks || [];
      const sparkHtml = sparks.map((s, i) => {
        const scores = s.scores || {};
        const scoreBits = [
          scores.novelty ? `新意 ${scores.novelty}` : '',
          scores.feasibility ? `可行 ${scores.feasibility}` : '',
          scores.impact ? `影响 ${scores.impact}` : '',
        ].filter(Boolean).join(' · ');
        const persp = ({ pm: 'PM', designer: '设计', engineer: '工程' })[s.perspective] || (s.perspective || '');
        const assumptions = (s.assumptions || []).map(a =>
          `<li>${escapeHtml(a)}</li>`
        ).join('');
        const links = (s.signal_urls || []).slice(0, 3).map((u, j) =>
          `<a href="${escapeHtml(u)}" target="_blank" rel="noopener">信号 ${j + 1}</a>`
        ).join('');
        return `
          <article class="idea-card">
            <div class="idea-card-top">
              <span class="idea-rank">${i + 1}</span>
              ${persp ? `<span class="idea-persp">${escapeHtml(persp)}</span>` : ''}
            </div>
            <h3 class="idea-name">${escapeHtml(s.name || '')}</h3>
            <p class="idea-oneliner">${escapeHtml(s.one_liner || '')}</p>
            ${s.opportunity ? `<p class="idea-row"><span class="idea-label">机会</span>${escapeHtml(s.opportunity)}</p>` : ''}
            ${s.solution ? `<p class="idea-row"><span class="idea-label">方案</span>${escapeHtml(s.solution)}</p>` : ''}
            ${s.mvp ? `<p class="idea-row"><span class="idea-label">MVP</span>${escapeHtml(s.mvp)}</p>` : ''}
            ${s.why_now ? `<p class="idea-row idea-row--muted"><span class="idea-label">为何现在</span>${escapeHtml(s.why_now)}</p>` : ''}
            ${s.signal ? `<p class="idea-row idea-row--muted"><span class="idea-label">信号</span>${escapeHtml(s.signal)}</p>` : ''}
            ${assumptions ? `<ul class="idea-assumptions">${assumptions}</ul>` : ''}
            <div class="idea-card-meta">
              ${scoreBits ? `<span>${escapeHtml(scoreBits)}</span>` : ''}
              ${links ? `<span class="idea-links">${links}</span>` : ''}
            </div>
          </article>`;
      }).join('');

      const ideasSection = sparks.length ? `
        <section class="digest-ideas">
          <div class="digest-ideas-head">
            <h2 class="digest-section-title">今日 Idea Sparks</h2>
            <p class="digest-section-desc">从信息洪流里挖可验证的项目方向（信号 → 机会 → 方案 → MVP）</p>
          </div>
          <div class="idea-grid">${sparkHtml}</div>
          ${data.idea_note ? `<p class="idea-note">${escapeHtml(data.idea_note)}</p>` : ''}
        </section>` : '';

      contentEl.innerHTML = `
        <header class="digest-hero">
          <p class="digest-kicker">AI Daily Brief</p>
          <h2 class="digest-headline">${escapeHtml(data.hero_headline)}</h2>
          <p class="digest-overview">${escapeHtml(data.daily_overview || '')}</p>
          ${keywords ? `<div class="digest-keywords">${keywords}</div>` : ''}
        </header>
        ${ideasSection}
        <section class="digest-briefs-wrap">
          <h2 class="digest-section-title">要点速览</h2>
          <div class="digest-briefs">${briefHtml}</div>
        </section>
        ${data.editor_note ? `<footer class="digest-note">${escapeHtml(data.editor_note)}</footer>` : ''}
      `;
    }

    async function loadDigest() {
      const loading = document.getElementById('digest-loading');
      loading.classList.add('hidden');
      try {
        const res = await fetch('/api/digest');
        if (res.status === 404) {
          renderDigest(null);
          return;
        }
        const data = await res.json();
        renderDigest(data);
      } catch (e) {
        renderDigest(null);
      }
    }

    async function generateDigest(force) {
      if (!LLM_READY) {
        alert('未配置 DEEPSEEK_API_KEY。请在项目根目录 .env 中设置后重启服务。');
        return;
      }
      const btn = document.getElementById('btn-gen-digest');
      const loading = document.getElementById('digest-loading');
      const emptyEl = document.getElementById('digest-empty');
      btn.disabled = true;
      loading.classList.remove('hidden');
      emptyEl.classList.add('hidden');
      document.getElementById('digest-content').classList.add('hidden');
      try {
        const res = await fetch('/api/digest/generate?force=' + (force ? '1' : '0'));
        const data = await res.json();
        if (!res.ok || data.status === 'error') {
          throw new Error(data.message || '生成失败');
        }
        renderDigest(data.digest);
      } catch (e) {
        emptyEl.classList.remove('hidden');
        emptyEl.querySelector('.state-empty-title').textContent = '生成失败';
        emptyEl.querySelector('.state-empty-desc').textContent = e.message || String(e);
      } finally {
        loading.classList.add('hidden');
        btn.disabled = false;
      }
    }

    // ── Init ──
    document.getElementById('year-select').value = currentYear;
    updateStats();
    render(true);
  </script>
</body>
</html>
