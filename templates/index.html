<!doctype html>
<html lang="zh-CN" class="bg-zinc-950 text-zinc-100">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AITrending — AI 信息聚合</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: '#00d4aa' } } }
    }
  </script>
  <style>
    /* ponytail: minimal custom styles, Tailwind handles 99% */
    .item-summary { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .item-summary.expanded { -webkit-line-clamp: unset; }
    .feed-badge { transition: all 0.15s; }
    .feed-badge.active { background: #00d4aa; color: #000; }
    .keyword-hl { background: #facc15; color: #000; padding: 0 2px; border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-zinc-800 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight">
          <span class="text-brand">AI</span>Trending
        </h1>
        <p class="text-zinc-500 text-sm mt-0.5">AI 研究热点 · 讨论趋势 · 实时聚合</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <select id="year-select" onchange="setYear(this.value)"
                  class="appearance-none bg-zinc-800 text-zinc-400 text-xs px-2.5 py-1.5 rounded-lg
                         border border-zinc-700 hover:border-zinc-600 focus:outline-none cursor-pointer pr-6">
            <option value="">📅 全部年份</option>
            {% for y in years %}
            <option value="{{ y }}">{{ y }}</option>
            {% endfor %}
          </select>
          <span class="pointer-events-none absolute right-1.5 top-1/2 -translate-y-1/2 text-zinc-600 text-xs">▼</span>
        </div>
        <span id="item-count" class="text-zinc-500 text-sm"></span>
        <button onclick="refresh()"
                class="text-sm px-3 py-1.5 rounded-lg bg-zinc-800 hover:bg-zinc-700 text-zinc-300 transition-colors">
          🔄 刷新
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-6">
    <!-- Search + Filters -->
    <div class="mb-6 space-y-3">
      <input id="search" type="text" placeholder="搜索标题 / 摘要…"
             class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-2.5 text-sm
                    placeholder-zinc-500 focus:outline-none focus:border-brand transition-colors"
             oninput="debounceRender()">

      <div id="feed-filters" class="flex flex-wrap gap-2">
        <button onclick="setFeed('')" data-feed=""
                class="feed-badge active text-xs px-2.5 py-1 rounded-full bg-zinc-800 text-zinc-400
                       hover:bg-zinc-700 cursor-pointer">
          全部
        </button>
        {% for f in feeds %}
        <button onclick="setFeed('{{ f.feed_name }}')" data-feed="{{ f.feed_name }}"
                class="feed-badge text-xs px-2.5 py-1 rounded-full bg-zinc-800 text-zinc-400
                       hover:bg-zinc-700 cursor-pointer">
          {{ f.feed_name }} <span class="text-zinc-600" id="cnt-{{ loop.index }}">({{ f.cnt }})</span>
        </button>
        {% endfor %}
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12 text-zinc-500 hidden">
      <div class="animate-pulse">加载中…</div>
    </div>

    <!-- Items list -->
    <div id="items" class="space-y-4"></div>

    <!-- Empty state -->
    <div id="empty" class="text-center py-20 hidden">
      <p class="text-zinc-600 text-lg">📭 暂无数据</p>
      <p class="text-zinc-700 text-sm mt-1">点击刷新按钮拉取最新内容</p>
    </div>
  </main>

  <script>
    // ── State ──
    let currentFeed = '';
    let currentSearch = '';
    let currentYear = '2026';  // ponytail: default to current year
    let debounceTimer;
    let abortController;

    // ── Render ──
    async function render() {
      const itemsEl = document.getElementById('items');
      const emptyEl = document.getElementById('empty');
      const loadingEl = document.getElementById('loading');
      const countEl = document.getElementById('item-count');

      // Cancel any previous request still in flight
      if (abortController) abortController.abort();
      abortController = new AbortController();

      loadingEl.classList.remove('hidden');
      emptyEl.classList.add('hidden');

      const params = new URLSearchParams({ limit: 3000 });
      if (currentFeed) params.set('feed', currentFeed);
      if (currentSearch) params.set('q', currentSearch);
      if (currentYear) params.set('year', currentYear);

      let items = [];
      try {
        const res = await fetch(`/api/items?${params}`, { signal: abortController.signal });
        items = await res.json();
      } catch (e) {
        if (e.name === 'AbortError') return; // silently ignore cancelled requests
        itemsEl.innerHTML = '<p class="text-red-400 text-center py-8">加载失败，请确认服务已启动</p>';
        loadingEl.classList.add('hidden');
        return;
      }

      loadingEl.classList.add('hidden');
      countEl.textContent = `${items.length} 条`;

      if (!items.length) {
        emptyEl.classList.remove('hidden');
        itemsEl.innerHTML = '';
        return;
      }

      const searchTerm = currentSearch.toLowerCase();
      itemsEl.innerHTML = items.map(item => {
        const title = item.title || '(no title)';
        const feed = item.feed_name;
        const summaryRaw = (item.summary || '').replace(/<[^>]*>/g, '');
        const summary = summaryRaw ? summaryRaw.slice(0, 280) : `来自 ${feed} 的最新内容`;
        const link = item.link || '#';
        const time = item.published ? new Date(item.published).toLocaleDateString('zh-CN', {
          month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        }) : '';

        // Highlight search term
        const hl = (text) => {
          if (!searchTerm) return text;
          const re = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
          return text.replace(re, '<mark class="keyword-hl">$1</mark>');
        };

        return `
          <article class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 hover:border-zinc-700 transition-colors">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <a href="${link}" target="_blank" rel="noopener"
                   class="text-sm font-medium text-zinc-100 hover:text-brand transition-colors line-clamp-2">
                  ${hl(title)}
                </a>
                <p class="item-summary text-xs text-zinc-400 mt-1.5 leading-relaxed"
                   onclick="this.classList.toggle('expanded')">
                  ${hl(summary)}
                </p>
              </div>
            </div>
            <div class="flex items-center gap-3 mt-2.5 text-xs text-zinc-500">
              <span class="px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400">${feed}</span>
              ${time ? `<span>${time}</span>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    function debounceRender() {
      clearTimeout(debounceTimer);
      currentSearch = document.getElementById('search').value;
      debounceTimer = setTimeout(render, 250);
    }

    function setFeed(feed) {
      currentFeed = feed;
      document.querySelectorAll('#feed-filters .feed-badge').forEach(b => {
        b.classList.toggle('active', b.dataset.feed === feed);
      });
      render();
    }

    function setYear(year) {
      currentYear = year;
      const sel = document.getElementById('year-select');
      if (sel) sel.value = year;
      updateFeedCounts(year);
      render();
    }

    async function updateFeedCounts(year) {
      try {
        const url = year ? `/api/feeds?year=${year}` : '/api/feeds';
        const res = await fetch(url);
        const feeds = await res.json();
        feeds.forEach(f => {
          const span = document.querySelector(`[data-feed="${f.feed_name}"] .text-zinc-600`);
          if (span) span.textContent = `(${f.cnt})`;
        });
        // also update the "全部" badge total
        const allSpan = document.querySelector('[data-feed=""] .text-zinc-600');
        if (allSpan) {
          const total = feeds.reduce((s, f) => s + f.cnt, 0);
          allSpan.textContent = `(${total})`;
        }
      } catch(e) { /* ignore */ }
    }

    async function refresh() {
      try {
        await fetch('/api/refresh');
      } catch (_) { /* ignore */ }
      render();
      // Also reload feed counts by reloading page (lazy but works)
      setTimeout(() => location.reload(), 1500);
    }

    // ── Init ──
    document.getElementById('year-select').value = currentYear;
    render();
  </script>
</body>
</html>
